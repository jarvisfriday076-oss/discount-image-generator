<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottela AI | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000000;
            --surface: rgba(24, 24, 27, 0.6);
            --border: rgba(255,255,255,0.1);
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --radius: 12px;
            --font: 'Inter', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        /* Ambient orbs */
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0;
        }
        .bg-orb--1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -100px; }
        .bg-orb--2 { width: 500px; height: 500px; background: #a855f7; bottom: -150px; right: -100px; }

        .login-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px; padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 36px;
            backdrop-filter: blur(20px);
        }
        .login-header { text-align: center; margin-bottom: 36px; }
        .login-header h1 {
            font-size: 28px; font-weight: 800; margin-bottom: 6px;
        }
        .login-header h1 span { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-header p { color: var(--text-dim); font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500; color: var(--text-dim);
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px; font-size: 15px;
            background: rgba(24,24,27,0.8); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: var(--font);
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .form-group input::placeholder { color: #52525b; }

        .login-btn {
            width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #7c3aed); color: white;
            border: none; border-radius: 10px; cursor: pointer;
            font-family: var(--font); transition: all 0.2s; margin-top: 8px;
        }
        .login-btn:hover { background: linear-gradient(135deg, #818cf8, #8b5cf6); transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }

        .flash-msg {
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px; text-align: center;
        }

        .login-footer {
            text-align: center; margin-top: 24px; font-size: 12px; color: #52525b;
        }
        .login-footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Bottela <span>AI</span></h1>
                <p>Sign in to your store dashboard</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Bottela AI &copy; 2026 &mdash; Premium Liquor Promotions</p>
            </div>
        </div>
    </div>
</body>
</html>
